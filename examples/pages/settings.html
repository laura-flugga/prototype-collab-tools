<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Northwind — Settings</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #0f172a; background: #eef0f6; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
      .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
      .brand { font-weight: 800; color: #4f46e5; }
      .save { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; font-size: 14px; cursor: pointer; }
      h1 { font-size: 22px; margin: 0 0 20px; }
      .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
      .field { margin: 0 0 22px; }
      .field:last-child { margin-bottom: 0; }
      .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
      .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #d7dbe4; border-radius: 8px; font-size: 15px; background: #fff; }
      .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand" data-annote="brand">◆ Northwind</div>
        <button class="save" data-annote="save">Save changes</button>
      </div>
      <h1>Account settings</h1>
      <div class="card">
        <div class="field">
          <label>Full name</label>
          <input data-annote="name" placeholder="Alex Rivera" />
        </div>
        <div class="field">
          <label>Work email</label>
          <input data-annote="email" placeholder="alex@company.com" />
        </div>
        <div class="field">
          <label>Workspace role</label>
          <select data-annote="role"><option>Admin</option><option>Member</option><option>Guest</option></select>
        </div>
      </div>
    </div>
  </body>
</html>
