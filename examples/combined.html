<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>prototype-collab-tools — combined example</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: #0f172a; background: #eef0f6; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 48px 24px 120px; }
      .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
      .brand { font-size: 20px; font-weight: 800; color: #4f46e5; }
      .save { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }
      h1 { font-size: 22px; margin: 0 0 20px; }
      .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
      .field { margin: 0 0 20px; }
      .field:last-child { margin-bottom: 0; }
      .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
      .field input { width: 100%; padding: 10px 12px; border: 1px solid #d7dbe4; border-radius: 8px; font-size: 15px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand" data-annote="brand">◆ Northwind</div>
        <button class="save" data-annote="save">Save changes</button>
      </div>
      <h1>Account settings</h1>
      <div class="card">
        <div class="field"><label>Full name</label><input data-annote="name" placeholder="Alex Rivera" /></div>
        <div class="field"><label>Work email</label><input data-annote="email" placeholder="alex@company.com" /></div>
      </div>
    </div>

    <script src="../packages/annotations/dist/annotations.iife.js"></script>
    <script src="../packages/proto-nav/dist/proto-nav.iife.js"></script>
    <script>
      // Annotations: no floating button — the nav menu controls visibility.
      Annotations.init({
        toggleButton: false,
        annotations: [
          { id: "a1", target: "brand", number: "1", title: "Brand mark", body: "Returns to the dashboard.", placement: "bottom" },
          { id: "a2", target: "save", number: "1.2", title: "Save action", body: "Persists changes.", placement: "bottom" },
          { id: "a3", target: "name", number: "2.1", title: "Full name", body: "Shown on the profile.", placement: "bottom" },
          { id: "a4", target: "email", number: "2.2a", title: "Work email", body: "Used for sign-in.", placement: "top" }
        ]
      });

      // Navigator: opens by default, and hosts the notes + target-picker controls.
      ProtoNav.init({
        title: "Northwind Prototype",
        startOpen: true,
        notesToggle: true,
        // Authoring aid, off by default — on here so the example demos it.
        picker: true,
        entries: [
          { title: "Marketing home", url: "pages/home.html", type: "flow", description: "Landing page and sign-up." },
          { title: "Dashboard", url: "pages/dashboard.html", type: "flow", description: "Signed-in overview." },
          { title: "Pricing", url: "pages/pricing.html", type: "requirement", description: "Plan comparison." },
          { title: "Account settings", url: "pages/settings.html", type: "edge-case", description: "Profile preferences." }
        ]
      });
    </script>
  </body>
</html>
