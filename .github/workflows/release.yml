name: Release

# Publishes any package whose version in package.json isn't on npm yet. Bump a
# version, merge to main, and that package ships; pushes that don't touch a
# version are a no-op (npm refuses to republish an existing version).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two publish runs race over the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Don't try to publish from forks — they have no NPM_TOKEN.
    if: github.repository == 'laura-flugga/prototype-collab-tools'
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Writes the .npmrc that picks up NODE_AUTH_TOKEN below.
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
      # Root build, so @proto-collab/shared is built before the widgets inline it.
      - run: npm run build

      - name: Publish packages with a new version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          published_any=0
          for dir in packages/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            version=$(node -p "require('./${dir}package.json').version")
            private=$(node -p "require('./${dir}package.json').private === true")

            if [ "$private" = "true" ]; then
              echo "· $name — private, skipping"
              continue
            fi

            # `npm view pkg@version` prints nothing (exit 0) for an unpublished
            # version of a known package, and errors for an unknown package —
            # so test the output, not the exit code.
            existing=$(npm view "$name@$version" version 2>/dev/null || true)
            if [ -n "$existing" ]; then
              echo "· $name@$version — already on npm, skipping"
              continue
            fi

            echo "→ publishing $name@$version"
            npm publish --workspace "$name" --provenance
            published_any=1
          done

          if [ "$published_any" = "0" ]; then
            echo "No version changes — nothing to publish."
          fi
