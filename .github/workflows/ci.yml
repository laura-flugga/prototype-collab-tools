name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build first: @proto-collab/shared's types resolve through its exports to
      # dist, so typecheck and tests can't see it until it has been built.
      - run: npm run build
      - run: npm run typecheck --workspaces --if-present
      - run: npm test --workspaces --if-present
